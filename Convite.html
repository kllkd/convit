<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Especial</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ffafbd, #885844);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
      color: #fff;
      font-size: 2.5em;
    }

    .photo-heart-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
      gap: 20px;
    }

    .circle-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
    }

    .heart-icon {
      font-size: 60px;
      color: red;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .buttons {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      width: 200px;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .yes {
      background-color: #28a745;
      color: white;
    }

    .no {
      background-color: #dc3545;
      color: white;
      position: relative;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8em;
        padding: 0 10px;
      }

      .circle-photo {
        width: 80px;
        height: 80px;
      }

      .heart-icon {
        font-size: 40px;
      }

      .btn {
        width: 80%;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <h1>Quer sair comigo? 💖</h1>

  <div class="photo-heart-container">
    <img src="https://i.imgur.com/7ZkUsSz.jpeg" alt="Sua Foto" class="circle-photo">

    <div class="heart-icon">❤️</div>

    <img src="https://i.imgur.com/bEtpnRp.png" alt="Foto Dela" class="circle-photo">
  </div>

  <div class="buttons">
    <button class="btn yes" onclick="aceitar()">Sim ❤️</button>
    <button class="btn no" id="noBtn">Não 😢</button>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");

    function aceitar() {
      // O link do WhatsApp funciona perfeitamente para compartilhar
      window.location.href = "https://wa.me/5511992569407?text=Eu%20aceito!";
    }

    // Lógica para o botão "Não" que se move
    noBtn.addEventListener("mouseover", () => {
      const i = Math.floor(Math.random() * (window.innerWidth - noBtn.clientWidth));
      const j = Math.floor(Math.random() * (window.innerHeight - noBtn.clientHeight));
      noBtn.style.position = "absolute";
      noBtn.style.left = i + "px";
      noBtn.style.top = j + "px";
    });
  </script>

</body>
</html>
